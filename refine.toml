# Automated refinement configuration
# Edit [focus] to point at the directory you want refined.
# Run: ./scripts/refine.sh

[focus]
path = "service/src/identity/"

[types]
pattern_enforcement = true
code_cleanup = true
test_coverage = true
security_hardening = true

[behavior]
# Seconds to wait between iterations (0 = as fast as possible)
cooldown = 0
# Stop after N PRs (0 = unlimited)
max_prs = 0
# Stop after N consecutive "nothing to improve" results
idle_limit = 3
# Minimum impact to create a PR: "low" = everything, "medium" = skip cleanup, "high" = only significant
min_impact = "medium"

[ci]
# Wait for CI after creating a PR and auto-fix failures
auto_fix = true
# Max fix attempts per PR before giving up
max_fix_attempts = 2
# Max seconds to wait for CI checks to complete
check_timeout = 900

[prompts]
# Markdown file with project-specific refinement guidance
guidance = "scripts/refine-guidance.md"
