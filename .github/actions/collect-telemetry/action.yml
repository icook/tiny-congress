name: Collect workflow telemetry
description: >
  Emit CPU, memory, disk I/O, and network I/O charts to the job summary.
  Samples at 5s intervals. Must run after checkout (local action).
runs:
  using: composite
  steps:
    - name: Collect workflow telemetry
      uses: whywaita/workflow-telemetry-action@9861d94d4f5862a5b8c5e863cf9a156a1b950738
      with:
        comment_on_pr: false
