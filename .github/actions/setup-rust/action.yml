name: Setup Rust Toolchain
description: Install Rust stable with toolchain + dependency caching via runs-on/cache

inputs:
  components:
    description: Comma-separated Rust components (e.g. rustfmt, clippy)
    default: ''
  targets:
    description: Comma-separated Rust targets (e.g. wasm32-unknown-unknown)
    default: ''
  cache-dependencies:
    description: Cache ~/.cargo/registry, ~/.cargo/git, and target/
    default: 'true'

runs:
  using: composite
  steps:
    # Check if the Rust toolchain is already installed (baked into ARC runner image).
    # If present, skip the toolchain cache download — just ensure extra components/targets.
    - name: Check for pre-installed Rust
      id: preinstalled
      shell: bash
      run: |
        if command -v rustc &>/dev/null && command -v cargo &>/dev/null; then
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Rust $(rustc --version) already installed, skipping toolchain cache"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi

    # Restore toolchain before dtolnay/rust-toolchain so rustup detects
    # existing installation and skips the download on warm runs.
    # Skipped when the toolchain is already baked into the runner image.
    - name: Cache Rust toolchain
      if: steps.preinstalled.outputs.found != 'true'
      uses: runs-on/cache@v4
      with:
        path: |
          ~/.rustup/toolchains
          ~/.rustup/update-hashes
          ~/.cargo/bin
        key: rustup-${{ runner.os }}-stable

    # Always run dtolnay/rust-toolchain to ensure requested components and targets
    # are present. On ARC runners with a pre-installed toolchain, this is a fast
    # no-op if `stable` hasn't advanced since the image was built; if stable has
    # advanced, rustup will update — this is accepted drift and keeps the toolchain
    # current. The baked version in mise.toml ensures a known baseline.
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Cache Rust dependencies
      if: inputs.cache-dependencies == 'true'
      uses: runs-on/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: rust-${{ runner.os }}-

    # sccache: compile-time caching via Garage S3 (ARC runners only).
    # GHA-hosted runners cannot reach the in-cluster Garage endpoint, so
    # sccache is skipped there — compilation falls back to the dependency
    # cache above with no other changes needed.
    - name: Install sccache
      if: runner.name != 'ubuntu-latest' && startsWith(runner.name, 'arc-runner')
      uses: taiki-e/install-action@v2
      with:
        tool: sccache

    - name: Configure sccache (ARC runners → Garage S3)
      if: runner.name != 'ubuntu-latest' && startsWith(runner.name, 'arc-runner')
      shell: bash
      run: |
        # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are injected into ARC runner
        # pods via the gha-cache-s3-runner-credentials Kubernetes secret (same
        # credentials used by runs-on/cache). No GitHub Actions secrets needed.
        : "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID not set — check arc runner pod spec}"
        : "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY not set — check arc runner pod spec}"

        {
          echo "SCCACHE_BUCKET=sccache"
          echo "SCCACHE_ENDPOINT=http://garage.garage.svc.cluster.local:3900"
          echo "SCCACHE_REGION=garage"
          echo "SCCACHE_S3_USE_SSL=false"
          # Keep the daemon alive for the full job (default 600 s is too short
          # for heavy compilation jobs like rust-coverage and codegen-check).
          echo "SCCACHE_IDLE_TIMEOUT=0"
          echo "RUSTC_WRAPPER=sccache"
        } >> "$GITHUB_ENV"
