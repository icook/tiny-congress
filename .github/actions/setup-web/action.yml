name: Setup Web Toolchain
description: Configure Node.js and yarn (from committed binary) with dependency caching

runs:
  using: composite
  steps:
    # Cache Node.js binary — self-hosted runners have no pre-installed tool
    # cache, so setup-node downloads it from GitHub on every run without this.
    - name: Restore Node.js toolchain cache
      uses: runs-on/cache/restore@v4
      with:
        path: ${{ runner.tool_cache }}
        key: node-toolcache-${{ runner.os }}-${{ hashFiles('web/.nvmrc') }}

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: web/.nvmrc
        # Disable built-in package-manager cache — we manage yarn cache below
        # via runs-on/cache to avoid conflicts on self-hosted ARC runners.
        cache: ''

    # yarn 4.x is committed at web/.yarn/releases/ (yarnPath in .yarnrc.yml).
    # Create a /usr/local/bin/yarn shim so 'yarn' works from any directory
    # without corepack or any network download.
    - name: Bootstrap yarn from committed binary
      shell: bash
      run: |
        YARN_VER=$(node -p "require('./web/package.json').packageManager.split('@')[1]")
        YARN_BIN="$GITHUB_WORKSPACE/web/.yarn/releases/yarn-${YARN_VER}.cjs"
        printf '#!/bin/sh\nexec node "%s" "$@"\n' "$YARN_BIN" | sudo tee /usr/local/bin/yarn > /dev/null
        sudo chmod +x /usr/local/bin/yarn

    # Disable hardened mode: it makes network calls during resolution to verify
    # the lockfile against the registry. We use --immutable which already prevents
    # lockfile manipulation, making the extra round-trip redundant and harmful on
    # runners with unreliable egress.
    - name: Disable yarn hardened mode
      shell: bash
      run: echo "YARN_ENABLE_HARDENED_MODE=0" >> "$GITHUB_ENV"

    - name: Restore yarn cache
      id: yarn-cache
      uses: runs-on/cache/restore@v4
      with:
        path: web/.yarn/cache
        key: yarn-cache-${{ runner.os }}-${{ hashFiles('web/yarn.lock') }}

    # Always run install: with a warm zip cache this takes ~15-20s to
    # materialise node_modules, far cheaper than downloading a 1.6 GB tar.
    - name: Install frontend dependencies
      shell: bash
      working-directory: web
      run: yarn install --immutable

    - name: Save Node.js toolchain cache
      if: always()
      uses: runs-on/cache/save@v4
      with:
        path: ${{ runner.tool_cache }}
        key: node-toolcache-${{ runner.os }}-${{ hashFiles('web/.nvmrc') }}

    - name: Save yarn cache
      if: always()
      uses: runs-on/cache/save@v4
      with:
        path: web/.yarn/cache
        key: yarn-cache-${{ runner.os }}-${{ hashFiles('web/yarn.lock') }}

