name: Refinement Loop

# Automated code refinement — finds and fixes one issue per iteration,
# creates PRs, and auto-fixes CI failures.
#
# Required secrets:
#   CLAUDE_CODE_OAUTH_TOKEN — OAuth token from Claude Max/Pro subscription (for `claude -p`)
#   REFINE_PAT              — Fine-grained GitHub PAT so pushed branches trigger CI.
#                              The default GITHUB_TOKEN does NOT trigger workflows on push.
#                              Run: ./scripts/refine-setup.sh

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      max_prs:
        description: 'Max PRs per target (0 = use refine.toml default)'
        required: false
        default: '0'
        type: string

concurrency:
  group: refinement
  # Don't cancel — let the running loop finish its iteration
  cancel-in-progress: false

jobs:
  refine:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so pushed branches trigger CI workflows
          token: ${{ secrets.REFINE_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── Tool setup ──────────────────────────────────────────────

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install yq
        run: |
          source .github/tool-versions
          if ! yq --version 2>/dev/null | grep -q "${YQ_VERSION#v}"; then
            sudo wget -qO /usr/local/bin/yq \
              "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
            sudo chmod +x /usr/local/bin/yq
          fi

      - name: Install just
        uses: extractions/setup-just@v3

      # ── Rust toolchain (for `just lint-backend` / `just test-backend`) ──

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: service

      # ── Node toolchain (for `just lint-frontend` / `just test-frontend`) ──

      - name: Setup web toolchain
        uses: ./.github/actions/setup-web

      # ── Docker (for testcontainers in backend tests) ──

      - name: Build test postgres image
        run: docker build -t tc-postgres:local -f dockerfiles/Dockerfile.postgres dockerfiles/

      # ── WASM (for frontend tests) ──

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (dev)
        run: just _build-wasm-dev

      # ── Override max_prs if provided via workflow_dispatch ──

      - name: Override max_prs
        if: ${{ github.event.inputs.max_prs != '0' && github.event.inputs.max_prs != '' }}
        env:
          MAX_PRS: ${{ github.event.inputs.max_prs }}
        run: |
          if ! [[ "$MAX_PRS" =~ ^[0-9]+$ ]]; then
            echo "ERROR: max_prs must be numeric, got: $MAX_PRS" >&2
            exit 1
          fi
          yq -i -p toml -o toml ".behavior.max_prs = $MAX_PRS" refine.toml
          echo "Overrode max_prs to $MAX_PRS"

      # ── Run ──────────────────────────────────────────────────────

      - name: Run refinement loop
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.REFINE_PAT || secrets.GITHUB_TOKEN }}
        run: ./scripts/refine.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refine-logs-${{ github.run_id }}
          path: .claude/refine.log
          retention-days: 14
