name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Target URL to test against"
        required: false
        default: "https://tiny-congress-demo.ibcook.com"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: smoke-test-${{ github.sha }}

jobs:
  smoke:
    name: Smoke (${{ matrix.project }})
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - webkit
          - mobile-chrome
          - mobile-safari
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: web/.node-version
          cache: yarn
          cache-dependency-path: web/yarn.lock

      - name: Install dependencies
        working-directory: web
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: web
        run: yarn playwright install --with-deps

      - name: Resolve target URL
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://tiny-congress-demo.ibcook.com" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for target reachable
        run: |
          for i in $(seq 1 30); do
            if curl -sSf --max-time 10 "${{ steps.target.outputs.url }}" > /dev/null 2>&1; then
              echo "Target is reachable"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 10s..."
            sleep 10
          done
          echo "Target not reachable after 30 attempts"
          exit 1

      - name: Run Playwright tests
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.target.outputs.url }}
          PLAYWRIGHT_SKIP_WEB_SERVER: "true"
        run: yarn playwright:test --project ${{ matrix.project }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ matrix.project }}
          path: |
            web/playwright-report
            web/test-results
          retention-days: 7
