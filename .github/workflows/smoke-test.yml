name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Target URL to test against"
        required: false
        default: "https://tiny-congress-demo.ibcook.com"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: smoke-test-${{ github.sha }}

jobs:
  preflight:
    name: Preflight
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      frontend_url: ${{ steps.urls.outputs.frontend }}
      api_url: ${{ steps.urls.outputs.api }}
      verifier_url: ${{ steps.urls.outputs.verifier }}
    steps:
      - name: Resolve URLs
        id: urls
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE="${{ github.event.inputs.url }}"
          else
            BASE="https://tiny-congress-demo.ibcook.com"
          fi
          if [[ "$BASE" != *"tiny-congress-demo."* ]]; then
            echo "Non-default URLs must follow the tiny-congress-demo.* pattern for API/verifier derivation"
            exit 1
          fi
          API="${BASE/https:\/\/tiny-congress-demo./https://tc-api-demo.}"
          VERIFIER="${BASE/https:\/\/tiny-congress-demo./https://tc-verify-demo.}"
          {
            echo "frontend=$BASE"
            echo "api=$API"
            echo "verifier=$VERIFIER"
          } >> "$GITHUB_OUTPUT"

      - name: Check HTTPS — frontend
        run: |
          curl -sSf --max-time 15 "${{ steps.urls.outputs.frontend }}" > /dev/null
          echo "Frontend reachable"

      - name: Check HTTPS — API
        run: |
          curl -sSf --max-time 15 "${{ steps.urls.outputs.api }}/health" > /dev/null
          echo "API reachable"

      - name: Check HTTPS — demo verifier
        run: |
          curl -sSf --max-time 15 "${{ steps.urls.outputs.verifier }}" > /dev/null
          echo "Demo verifier reachable"

      - name: Check sim worker — rooms exist
        run: |
          RESP=$(curl -sSf --max-time 15 \
            "${{ steps.urls.outputs.api }}/rooms")
          echo "Response: $RESP"
          echo "$RESP" | grep -q '"id"' || { echo "No rooms found — sim worker may not be running"; exit 1; }
          echo "Sim worker content verified"

  smoke:
    name: Smoke (${{ matrix.project }})
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - webkit
          - mobile-chrome
          - mobile-safari
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Setup web toolchain
        uses: ./.github/actions/setup-web

      - name: Install Playwright browsers
        working-directory: web
        run: yarn playwright install --with-deps

      - name: Run Playwright tests
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.preflight.outputs.frontend_url }}
          PLAYWRIGHT_API_URL: ${{ needs.preflight.outputs.api_url }}/graphql
          PLAYWRIGHT_SKIP_WEB_SERVER: "true"
        run: yarn playwright:test --project ${{ matrix.project }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ matrix.project }}
          path: |
            web/playwright-report
            web/test-results
          retention-days: 7
