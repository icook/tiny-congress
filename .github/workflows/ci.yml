          EOF

      - name: Upload reports to Dufs
        env:
          DUFS_PASSWORD: ${{ secrets.DUFS_UPLOAD_PASSWORD }}
        run: |
          set -euo pipefail
          DEST="${{ github.sha }}"
          BASE="https://reports-upload.ibcook.com"

          upload_dir() {
            local target="$1"
            while IFS= read -r -d '' file; do
              rel="${file#site/}"
              echo "Uploading ${rel} → ${target}/${rel}"
              curl --fail-with-body --retry 2 -u "ci:${DUFS_PASSWORD}" \
                -T "$file" \
                "${BASE}/${target}/${rel}"
            done < <(find site -type f -print0)
          }

          upload_dir "$DEST"
          upload_dir "latest"

          {
            echo "### 📋 CI Reports"
            echo ""
            echo "- [Latest](https://reports.ibcook.com/latest/)"
            echo "- [This run](https://reports.ibcook.com/${DEST}/)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Add PR comment with report links
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pages-reports
          message: |
            ## 🏛️ CI Reports

            **[📋 All Reports](https://reports.ibcook.com/${{ github.sha }}/)**

            ### 📚 API Documentation
            | | |
            |---|---|
            | 🦀 [Rust API Docs](https://reports.ibcook.com/${{ github.sha }}/rust-docs/tinycongress_api/) | 📘 [TypeScript Docs](https://reports.ibcook.com/${{ github.sha }}/ts-docs/) |

            ### 🧪 Test Artifacts
            | | |
            |---|---|
            | 📊 [Coverage](https://reports.ibcook.com/${{ github.sha }}/coverage/) | 📚 [Storybook](https://reports.ibcook.com/${{ github.sha }}/storybook/) |
            | 🎭 [Playwright](https://reports.ibcook.com/${{ github.sha }}/playwright/) | |

            <sub>🤖 Generated from commit ${{ github.sha }}</sub>
