name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/${{ github.repository }}
  TRIVY_VERSION: '0.69.3'

permissions:
  contents: read
  actions: read

jobs:
  # ── Backend checks (lint + codegen + security audit) ───────
  backend-checks:
    name: Backend checks
    needs: [detect-changes]
    if: >-
      needs.detect-changes.outputs.api == 'true' ||
      needs.detect-changes.outputs.ui == 'true' ||
      needs.detect-changes.outputs.ci == 'true'
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for gitleaks

      - uses: ./.github/actions/collect-telemetry

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      - name: Setup web toolchain
        uses: ./.github/actions/setup-web

      - name: Install just
        uses: extractions/setup-just@v3

      # ── Lint ──
      - name: Lint backend
        if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.ci == 'true'
        run: just lint-backend

      # gitleaks GitHub Action provides richer integration than the CLI
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Codegen check ──
      - name: Install frontend dependencies
        run: just _ensure-frontend-deps

      - name: Run codegen
        run: just codegen

      - name: Check for uncommitted codegen changes
        run: |
          if ! git diff --quiet web/schema.graphql web/openapi.json web/src/api/generated/; then
            echo "::error::Codegen is out of date. Run 'just codegen' and commit the changes."
            git diff web/schema.graphql web/openapi.json web/src/api/generated/
            exit 1
          fi
          echo "✓ Codegen is up to date"

      # ── Security & dependency audit ──
      - name: Install cargo-deny
        if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.ci == 'true'
        uses: taiki-e/install-action@cargo-deny

      - name: Install cargo-machete
        if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.ci == 'true'
        uses: taiki-e/install-action@cargo-machete

      - name: Run dependency audit
        if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.ci == 'true'
        run: just audit-deps

      - name: Check for unused dependencies
        if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.ci == 'true'
        run: just audit-unused

  # ── Lint Kubernetes manifests ─────────────────────────────
  lint-kube:
    name: Lint Kubernetes manifests
    needs: [detect-changes]
    if: needs.detect-changes.outputs.chart == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Run kube-linter
        uses: stackrox/kube-linter-action@v1
        with:
          directory: kube/
          config: .kube-linter.yaml
          version: "v0.8.1"

      # Helm is pre-installed in the ARC runner image (dockerfiles/Dockerfile.arc-runner).
      # To upgrade, bump ARG HELM_VERSION there and rebuild via build-arc-runner.yml.

      - name: Validate environment values
        run: |
          # Render the chart with each environment values file to catch drift.
          # Image tags are stubbed — digests are provided by CD, not by values files.
          for VALUES_FILE in kube/environments/*.yaml; do
            ENV_NAME=$(basename "$VALUES_FILE" .yaml)
            echo "::group::helm template ($ENV_NAME)"
            helm template "tc-${ENV_NAME}" kube/app \
              -f "$VALUES_FILE" \
              --set image.tag=ci-stub \
              --set frontend.image.tag=ci-stub \
              --set postgres.image.tag=ci-stub
            echo "::endgroup::"
          done

  # ── Validate Grafana dashboards ──────────────────────────
  check-dashboards:
    name: Validate Grafana dashboards
    needs: [detect-changes]
    if: needs.detect-changes.outputs.dashboards == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: runs-on/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('kube/dashboards/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r kube/dashboards/requirements.txt

      - name: Validate dashboard definitions
        run: cd kube/dashboards && python generate.py --check

      - name: Check generated JSON is up to date
        run: |
          cd kube/dashboards && python generate.py
          cd "$GITHUB_WORKSPACE"
          if ! git diff --exit-code kube/app/files/dashboards/; then
            echo "::error::Generated dashboard JSON is out of date. Run 'just generate-dashboards' and commit."
            exit 1
          fi

  # ── Frontend checks (lint + Storybook build) ───────────────
  frontend-checks:
    name: Frontend checks
    needs: [detect-changes]
    if: needs.detect-changes.outputs.ui == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Setup web toolchain
        uses: ./.github/actions/setup-web

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install dependencies
        run: just _ensure-frontend-deps

      - name: Run Linters
        run: just lint-frontend

      - name: Build Storybook
        run: just build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v6
        with:
          name: storybook-static
          path: web/storybook-static/
          retention-days: 30

  # ── Static analysis (typos, Dockerfiles, workflows, scripts)
  static-analysis:
    name: Static Analysis
    needs: [detect-changes]
    if: >-
      needs.detect-changes.outputs.api == 'true' ||
      needs.detect-changes.outputs.ui == 'true' ||
      needs.detect-changes.outputs.chart == 'true' ||
      needs.detect-changes.outputs.ci == 'true'
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli

      - name: Install hadolint
        run: |
          curl -fsSL "https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64" -o hadolint
          sudo install hadolint /usr/local/bin/

      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo install actionlint /usr/local/bin/

      # GHA ubuntu-24.04 pre-installs shellcheck; it's not in catthehacker's apt sources.
      - name: Install shellcheck
        run: |
          VERSION=v0.10.0
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${VERSION}/shellcheck-${VERSION}.linux.x86_64.tar.xz" \
            | sudo tar -xJ --strip-components=1 -C /usr/local/bin/ "shellcheck-${VERSION}/shellcheck"

      - name: Run static analysis
        run: just lint-static

  # ── Build API documentation ──────────────────────────────
  build-docs:
    name: Build documentation
    needs: [detect-changes]
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.ui == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup web toolchain
        uses: ./.github/actions/setup-web

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Build docs
        run: just docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs
          path: |
            target/doc
            web/docs
          retention-days: 7

  # ── Detect which paths changed (skip unnecessary builds) ─
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
    outputs:
      postgres: ${{ steps.filter.outputs.postgres }}
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
      chart: ${{ steps.filter.outputs.chart }}
      dashboards: ${{ steps.filter.outputs.dashboards }}
      ci: ${{ steps.filter.outputs.ci }}
      # Runner tier outputs — set all at once, each job picks the right size.
      # Toggle: gh variable set USE_ARC_RUNNERS --body "false" --repo icook/tiny-congress
      runner-nano: ${{ steps.runner.outputs.small }}
      runner-small: ${{ steps.runner.outputs.small }}
      runner-large: ${{ steps.runner.outputs.large }}
      # 'true' when running on ARC self-hosted runners, 'false' for GHA-hosted.
      use-arc: ${{ steps.runner.outputs.use-arc }}
      # Image registry — where built images are pushed/pulled during CI.
      image-registry: ${{ steps.runner.outputs.image-registry }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Select runner
        id: runner
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Two ways to enable ARC runners:
          #   1. PR title contains [arc]         — sticky for the whole PR lifecycle
          #   2. Repo var USE_ARC_RUNNERS=true   — global default
          # Fallback: ubuntu-latest (GHA hosted)
          if echo "$PR_TITLE" | grep -qF '[arc]' || [ "${{ vars.USE_ARC_RUNNERS }}" = "true" ]; then
            {
              echo "use-arc=true"
              echo "small=arc-runner-small"
              echo "large=arc-runner-large"
              echo "image-registry=zot.zot.svc.cluster.local:5000/images"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "use-arc=false"
              echo "small=ubuntu-latest"
              echo "large=ubuntu-latest"
              echo "image-registry=ghcr.io/icook/tiny-congress"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Set CI runners check
        uses: actions/github-script@v7
        with:
          script: |
            const useArc = '${{ steps.runner.outputs.use-arc }}' === 'true';
            // Use PR head SHA (not merge commit) so the check appears on the PR
            const sha = context.payload.pull_request?.head?.sha || context.sha;
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: useArc ? 'CI runners: ARC self-hosted' : 'CI runners: GHA hosted',
              head_sha: sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: useArc ? '🚀 ARC self-hosted runners' : '☁️ GHA hosted runners (ubuntu-latest)',
                summary: useArc
                  ? 'Triggered by `[arc]` in PR title or `USE_ARC_RUNNERS=true`.'
                  : 'Add `[arc]` to the PR title or set `USE_ARC_RUNNERS=true` to switch to ARC.',
              },
            });
      - name: Print image registry
        run: echo "::notice title=Image Registry::${{ steps.runner.outputs.image-registry }}"
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            postgres:
              - 'dockerfiles/Dockerfile.postgres'
            api:
              - 'service/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            ui:
              - 'web/**'
              - 'crates/tc-crypto/**'
            chart:
              - 'kube/app/**'
              - 'kube/environments/**'
            dashboards:
              - 'kube/dashboards/**'
              - 'kube/app/files/dashboards/**'
            ci:
              - '.github/workflows/**'
              - '!.github/workflows/build-arc-runner.yml'
              - 'skaffold.yaml'
              - 'justfile'

  # ── Build WASM tc-crypto (shared artifact) ────────────────
  build-wasm:
    name: Build WASM
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    needs: [detect-changes]
    if: >-
      needs.detect-changes.outputs.ui == 'true' ||
      needs.detect-changes.outputs.api == 'true' ||
      needs.detect-changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          cache-dependencies: 'false'

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - name: Build WASM
        run: |
          cd crates/tc-crypto
          wasm-pack build --target web --release --out-dir ../../web/src/wasm/tc-crypto

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v6
        with:
          name: tc-crypto-wasm
          path: web/src/wasm/tc-crypto/
          retention-days: 1

  # ── Build all container images in parallel ────────────────
  build-images:
    name: Build ${{ matrix.image }}
    needs: [detect-changes]
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    permissions:
      contents: read
      actions: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tc-api-release
            context: .
            dockerfile: service/Dockerfile
          - image: tc-ui-release
            context: .
            dockerfile: web/Dockerfile
          - image: postgres
            context: .
            dockerfile: dockerfiles/Dockerfile.postgres
    outputs:
      tc-api-release-tag: ${{ steps.meta.outputs.tc-api-release-tag }}
      tc-ui-release-tag: ${{ steps.meta.outputs.tc-ui-release-tag }}
      postgres-tag: ${{ steps.meta.outputs.postgres-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Network diagnostics
        if: runner.environment == 'self-hosted'
        continue-on-error: true
        run: |
          set -x
          for host in auth.docker.io registry-1.docker.io ghcr.io api.github.com zot.zot.svc.cluster.local; do
            echo "--- $host ---"
            nslookup "$host" 2>&1 | head -6 || true
          done
          for url in https://ghcr.io/v2/ http://zot.zot.svc.cluster.local:5000/v2/; do
            curl -sS -o /dev/null -w "dns:%{time_namelookup} tcp:%{time_connect} tls:%{time_appconnect} total:%{time_total} http:%{http_code}\n" \
              --max-time 10 "$url" || true
          done

      # BuildKit + cache registry adapt to the runner environment:
      # - ARC (self-hosted): remote BuildKit daemon + Zot in-cluster registry
      # - GHA (hosted):      local buildx driver + GHCR for layer cache
      # This lets the same workflow work on both without conditional runs-on.
      - name: Set up Docker Buildx (remote in-cluster BuildKit)
        if: runner.environment == 'self-hosted'
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkitd.buildkit.svc.cluster.local:1234

      - name: Set up Docker Buildx
        if: runner.environment != 'self-hosted'
        uses: docker/setup-buildx-action@v3

      - name: Configure registries
        id: registries
        run: |
          IMAGE_REGISTRY="${{ needs.detect-changes.outputs.image-registry }}"
          if [ "$RUNNER_ENVIRONMENT" = "self-hosted" ]; then
            echo "cache=zot.zot.svc.cluster.local:5000/cache" >> "$GITHUB_OUTPUT"
          else
            echo "cache=${IMAGE_REGISTRY}" >> "$GITHUB_OUTPUT"
          fi
          echo "images=${IMAGE_REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: runner.environment != 'self-hosted'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGES="${{ steps.registries.outputs.images }}"
          ref="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          branch="${ref//[^a-zA-Z0-9_.-]/-}"
          branch="${branch,,}"
          {
            echo "branch_slug=${branch}"
            echo "sha_tag=${IMAGES}/${{ matrix.image }}:${{ github.sha }}"
            echo "branch_tag=${IMAGES}/${{ matrix.image }}:branch-${branch}"
          } >> "$GITHUB_OUTPUT"

      - name: Check if build needed
        id: should-build
        run: |
          # CI changes (workflows, justfile) force a full rebuild — the build
          # process itself may have changed, so retagging stale images is wrong.
          ci_changed="${{ needs.detect-changes.outputs.ci }}"
          case "${{ matrix.image }}" in
            tc-api-release) changed="${{ needs.detect-changes.outputs.api }}" ;;
            tc-ui-release)  changed="${{ needs.detect-changes.outputs.ui }}" ;;
            postgres)       changed="${{ needs.detect-changes.outputs.postgres }}" ;;
            *)              changed="true" ;;
          esac
          if [ "$ci_changed" = "true" ]; then changed="true"; fi
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "${{ matrix.image }}: changed=${changed} (ci=${ci_changed})"

      - name: Retag existing image
        if: steps.should-build.outputs.changed == 'false'
        run: |
          # Always retag from branch-master (last successful master build)
          SOURCE="${{ steps.registries.outputs.images }}/${{ matrix.image }}:branch-master"
          echo "No source changes for ${{ matrix.image }} — retagging ${SOURCE} as ${{ github.sha }}"
          docker buildx imagetools create \
            --tag "${{ steps.tags.outputs.sha_tag }}" \
            "${SOURCE}"

      - name: Set build metadata
        if: steps.should-build.outputs.changed != 'false'
        id: buildmeta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Extract versions from mise.toml
        if: steps.should-build.outputs.changed != 'false'
        id: versions
        run: |
          RUST_VERSION=$(grep '^rust' mise.toml | sed 's/.*= *"\([^"]*\)".*/\1/')
          NODE_VERSION=$(grep '^node' mise.toml | sed 's/.*= *"\([^"]*\)".*/\1/')
          echo "rust=${RUST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "node=${NODE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }}
        if: steps.should-build.outputs.changed != 'false'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            RUST_VERSION=${{ steps.versions.outputs.rust }}
            NODE_VERSION=${{ steps.versions.outputs.node }}
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ github.ref_name }}@${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.branch_tag }}
          cache-from: |
            type=registry,ref=${{ steps.registries.outputs.cache }}/${{ matrix.image }}:cache
          cache-to: |
            type=registry,ref=${{ steps.registries.outputs.cache }}/${{ matrix.image }}:cache,mode=max

      - name: Export image metadata
        id: meta
        run: |
          echo "${{ matrix.image }}-tag=${{ steps.tags.outputs.sha_tag }}" >> "$GITHUB_OUTPUT"

  # ── Scan container images for vulnerabilities ─────────────
  scan-images:
    name: Scan ${{ matrix.image }}
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    needs: [build-images, detect-changes]
    strategy:
      fail-fast: false
      matrix:
        image:
          - tc-api-release
          - tc-ui-release
          - postgres
    steps:
      - name: Collect workflow telemetry
        uses: catchpoint/workflow-telemetry-action@v2
        with:
          comment_on_pr: false

      - name: Check if scan needed
        id: should-scan
        run: |
          case "${{ matrix.image }}" in
            tc-api-release) changed="${{ needs.detect-changes.outputs.api }}" ;;
            tc-ui-release)  changed="${{ needs.detect-changes.outputs.ui }}" ;;
            postgres)       changed="${{ needs.detect-changes.outputs.postgres }}" ;;
            *)              changed="true" ;;
          esac
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.should-scan.outputs.changed != 'false'
        uses: actions/checkout@v6
        with:
          sparse-checkout: .trivyignore
          sparse-checkout-cone-mode: false

      - name: Login to GHCR
        if: steps.should-scan.outputs.changed != 'false' && runner.environment != 'self-hosted'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Trivy binary
        if: steps.should-scan.outputs.changed != 'false'
        id: trivy-bin
        uses: runs-on/cache@v4
        with:
          path: ~/.local/bin/trivy
          key: trivy-bin-${{ env.TRIVY_VERSION }}-linux-amd64

      - name: Install Trivy
        if: steps.should-scan.outputs.changed != 'false' && steps.trivy-bin.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$HOME/.local/bin"
          DL_URL="https://github.com/aquasecurity/trivy/releases/download"
          TARBALL="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fL --retry 3 --retry-delay 5 \
            -H "Authorization: token ${GH_TOKEN}" \
            "${DL_URL}/v${TRIVY_VERSION}/${TARBALL}" \
            -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C "$HOME/.local/bin" trivy
          "$HOME/.local/bin/trivy" --version

      - name: Add Trivy to PATH
        if: steps.should-scan.outputs.changed != 'false'
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Trivy DB
        if: steps.should-scan.outputs.changed != 'false'
        uses: runs-on/cache@v4
        with:
          path: .cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Run Trivy vulnerability scanner
        if: steps.should-scan.outputs.changed != 'false'
        uses: aquasecurity/trivy-action@0.34.0
        env:
          TRIVY_INSECURE: ${{ runner.environment == 'self-hosted' && 'true' || 'false' }}
        with:
          image-ref: ${{ needs.detect-changes.outputs.image-registry }}/${{ matrix.image }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          skip-setup-trivy: true
          cache-dir: .cache/trivy

  # ── Vitest unit tests + coverage ─────────────────────────
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    needs: [detect-changes, build-wasm]
    if: needs.detect-changes.outputs.ui == 'true' || needs.detect-changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Setup web toolchain
        uses: ./.github/actions/setup-web

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-crypto-wasm
          path: web/src/wasm/tc-crypto/

      - name: Run Vitest with coverage
        working-directory: web
        run: CI=true yarn vitest:coverage

      - name: Upload Vitest coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: vitest-coverage
          path: web/coverage/vitest/
          retention-days: 7

  # ── Rust checks (SQLx snapshots + coverage) ───────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ${{ needs.detect-changes.outputs.runner-large }}
    needs: [detect-changes]
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.ci == 'true'
    env:
      # Use the branch-master tag (last successful master build) so rust-checks
      # can start in wave 1 without waiting for build-images.
      # Migrations run from the working tree (cargo sqlx migrate run), so this
      # is valid for all migration-only changes.
      # Known gap: a PR that simultaneously modifies Dockerfile.postgres (adding
      # a new extension) AND adds a migration that requires that extension will
      # fail here. That's rare; when it happens, re-run after build-images pushes
      # the new postgres image to branch-<pr-branch> and retag manually, or
      # temporarily restore build-images to rust-checks needs.
      TEST_POSTGRES_IMAGE: ghcr.io/${{ github.repository }}/postgres:branch-master
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Wait for Docker sidecar
        run: until docker info >/dev/null 2>&1; do sleep 1; done

      - name: Login to GHCR
        if: runner.environment != 'self-hosted'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # ── SQLx snapshot check ──
      - name: Start postgres
        run: |
          CONTAINER_NAME="postgres-${GITHUB_RUN_ID}"
          docker run -d --name "$CONTAINER_NAME" \
            -p 5432 \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            ${{ env.TEST_POSTGRES_IMAGE }}

          DOCKER_HOSTNAME="127.0.0.1"
          PG_PORT=$(docker port "$CONTAINER_NAME" 5432 | head -1 | sed 's/.*://')

          for i in {1..30}; do
            if docker exec "$CONTAINER_NAME" pg_isready -U postgres; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for postgres... ($i/30)"
            sleep 1
          done
          if ! docker exec "$CONTAINER_NAME" pg_isready -U postgres 2>/dev/null; then
            echo "::error::Postgres did not become ready in 30s"
            exit 1
          fi

          echo "DATABASE_URL=postgres://postgres:postgres@${DOCKER_HOSTNAME}:${PG_PORT}/tiny-congress" >> "$GITHUB_ENV"

      - name: Cache sqlx-cli binary
        id: cache-sqlx-cli
        uses: runs-on/cache@v4
        with:
          path: |
            ~/.cargo/bin/sqlx
            ~/.cargo/bin/cargo-sqlx
          key: sqlx-cli-${{ runner.os }}-0.8.6-v2

      - name: Install sqlx-cli
        if: steps.cache-sqlx-cli.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --version 0.8.6 --locked --no-default-features --features postgres

      - name: Run migrations
        working-directory: service
        run: cargo sqlx migrate run

      - name: Check SQLx snapshots
        working-directory: service
        run: |
          output=$(cargo sqlx prepare --check 2>&1) || {
            echo "$output"
            echo "::error::SQLx query snapshots are out of date. Run 'just sqlx-prepare' and commit the changes in service/.sqlx/"
            exit 1
          }
          echo "$output"
          if echo "$output" | grep -q "potentially unused queries"; then
            echo "::error::Unused SQLx query snapshots found in .sqlx/. Run 'just sqlx-prepare' to remove stale entries."
            exit 1
          fi
          echo "✓ SQLx snapshots are up to date"

      - name: Cleanup postgres (best effort)
        if: always()
        run: docker rm -f "postgres-${GITHUB_RUN_ID}" 2>/dev/null || true

      # ── Rust coverage ──
      - name: Generate Rust coverage
        working-directory: service
        run: |
          set -euo pipefail
          mkdir -p coverage
          cargo llvm-cov --lcov --output-path coverage/backend-unit.lcov --fail-under-lines 60

      - name: Upload Rust coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rust-coverage
          if-no-files-found: warn
          path: service/coverage/backend-unit.lcov

  # ── E2E tests (KinD + Skaffold + Playwright) ─────────────
  e2e-tests:
    name: E2E tests
    runs-on: ${{ needs.detect-changes.outputs.runner-large }}
    needs:
      - detect-changes
      - build-images
      - build-wasm
    if: >-
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    permissions:
      contents: read
      actions: read
      packages: read
      checks: write
    env:
      SKAFFOLD_DEFAULT_REPO: ${{ needs.detect-changes.outputs.image-registry }}
      SKAFFOLD_PROFILE: ci
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
      KIND_CLUSTER_NAME: skaffold-ci-${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Network diagnostics
        if: runner.environment == 'self-hosted'
        continue-on-error: true
        run: |
          set -x
          for host in auth.docker.io registry-1.docker.io ghcr.io api.github.com zot.zot.svc.cluster.local; do
            echo "--- $host ---"
            nslookup "$host" 2>&1 | head -6 || true
          done
          for url in https://ghcr.io/v2/ http://zot.zot.svc.cluster.local:5000/v2/; do
            curl -sS -o /dev/null -w "dns:%{time_namelookup} tcp:%{time_connect} tls:%{time_appconnect} total:%{time_total} http:%{http_code}\n" \
              --max-time 10 "$url" || true
          done

      - name: Wait for Docker sidecar
        run: until docker info >/dev/null 2>&1; do sleep 1; done

      - name: Install KinD tooling
        uses: helm/kind-action@v1.13.0
        with:
          install_only: true
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}

      # Helm is pre-installed in the ARC runner image (dockerfiles/Dockerfile.arc-runner).
      # To upgrade, bump ARG HELM_VERSION there and rebuild via build-arc-runner.yml.

      - name: Start KinD cluster in background
        run: |
          set -euo pipefail

          # Docker sets iptables FORWARD to DROP; fix before cluster creation.
          sudo iptables -P FORWARD ACCEPT 2>/dev/null || true

          KIND_LOG="${RUNNER_TEMP}/kind.log"
          echo "KIND_LOG=${KIND_LOG}" >> "$GITHUB_ENV"

          # On ARC, configure KinD's containerd to use zot as a mirror
          # so pods can pull CI-built images without egress.
          KIND_CONFIG="${RUNNER_TEMP}/kind-config.yaml"
          cat > "$KIND_CONFIG" <<'KINDEOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          networking:
            # Avoid CIDR overlap with the parent Talos cluster (default 10.96.0.0/12).
            # Without this, KinD CoreDNS traffic to 10.96.0.1 escapes the Docker
            # bridge and hits the parent API server (wrong CA → x509 errors).
            serviceSubnet: "10.11.0.0/16"
            podSubnet: "10.12.0.0/16"
          nodes:
            - role: control-plane
              kubeadmConfigPatches:
                - |
                  kind: InitConfiguration
                  nodeRegistration:
                    kubeletExtraArgs:
                      node-labels: "ingress-ready=true"
          KINDEOF

          if [ "$RUNNER_ENVIRONMENT" = "self-hosted" ]; then
            cat >> "$KIND_CONFIG" <<'KINDEOF'
          containerdConfigPatches:
            - |-
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors."zot.zot.svc.cluster.local:5000"]
                endpoint = ["http://zot.zot.svc.cluster.local:5000"]
          KINDEOF
          fi

          echo "Starting KinD cluster ${KIND_CLUSTER_NAME} (logs: ${KIND_LOG})"
          kind create cluster --name "${KIND_CLUSTER_NAME}" --config "${KIND_CONFIG}" --wait 0s >"${KIND_LOG}" 2>&1 &

      - name: Cache Skaffold binary
        id: cache-skaffold
        uses: runs-on/cache@v4
        with:
          path: ${{ runner.temp }}/skaffold-bin
          key: skaffold-${{ runner.os }}-${{ hashFiles('.skaffold-version') }}

      - name: Install Skaffold
        run: |
          set -euo pipefail
          SKAFFOLD_BIN="${RUNNER_TEMP}/skaffold-bin/skaffold"
          if [ ! -f "$SKAFFOLD_BIN" ]; then
            mkdir -p "${RUNNER_TEMP}/skaffold-bin"
            SKAFFOLD_VERSION="v$(cat .skaffold-version)"
            curl -fsSL -o "$SKAFFOLD_BIN" \
              "https://storage.googleapis.com/skaffold/releases/${SKAFFOLD_VERSION}/skaffold-linux-amd64"
            chmod +x "$SKAFFOLD_BIN"
          fi
          sudo install "$SKAFFOLD_BIN" /usr/local/bin/skaffold

      - name: Login to GHCR
        if: runner.environment != 'self-hosted'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Skaffold artifacts file
        id: artifacts
        run: |
          set -euo pipefail
          IMAGE_REG="${{ needs.detect-changes.outputs.image-registry }}"
          artifacts_file="${RUNNER_TEMP}/skaffold-artifacts.json"
          printf '{\n  "builds": [\n    {"imageName": "tc-api-release", "tag": "%s/tc-api-release:%s"},\n    {"imageName": "tc-ui-release", "tag": "%s/tc-ui-release:%s"},\n    {"imageName": "postgres", "tag": "%s/postgres:%s"}\n  ]\n}\n' \
            "$IMAGE_REG" "${{ github.sha }}" \
            "$IMAGE_REG" "${{ github.sha }}" \
            "$IMAGE_REG" "${{ github.sha }}" \
            > "$artifacts_file"
          echo "file=${artifacts_file}" >> "$GITHUB_OUTPUT"

      - name: Setup web toolchain
        uses: ./.github/actions/setup-web

      - name: Restore Playwright browser cache
        uses: runs-on/cache/restore@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-chromium-${{ hashFiles('web/yarn.lock') }}

      - name: Install Playwright browsers
        working-directory: web
        run: yarn playwright install --with-deps chromium

      - name: Save Playwright browser cache
        if: always()
        uses: runs-on/cache/save@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-chromium-${{ hashFiles('web/yarn.lock') }}

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-crypto-wasm
          path: web/src/wasm/tc-crypto/

      - name: Wait for KinD readiness
        run: |
          set -euo pipefail
          NODE="${KIND_CLUSTER_NAME}-control-plane"

          # 1. Wait for API server
          echo "Waiting for cluster API..."
          if ! timeout 180 bash -c "until kubectl cluster-info --context kind-${KIND_CLUSTER_NAME} >/dev/null 2>&1; do sleep 5; done"; then
            echo "KinD did not start in time; dumping logs."
            cat "${KIND_LOG:?}" || true
            exit 1
          fi

          # 2. Fix iptables FORWARD on KinD node (Docker sets DROP)
          kubectl wait node "$NODE" --for=condition=Ready --timeout=180s
          docker exec "$NODE" iptables -P FORWARD ACCEPT

          # 3. Wait for CoreDNS ready (with non-overlapping subnets, CoreDNS
          # should reach the correct API server without CA issues)
          kubectl wait pods -n kube-system -l k8s-app=kube-dns \
            --for=condition=Ready --timeout=240s

          # 4. Wait for default SA (can race on slower storage)
          timeout 60 bash -c \
            'until kubectl get sa default -n default >/dev/null 2>&1; do sleep 2; done'

          # Pin kubectl context to 'default' namespace so every kubectl call
          # in later steps targets KinD, not the parent cluster's arc-runners ns.
          kubectl config set-context --current --namespace=default

          kubectl get nodes -o wide
          echo "KinD cluster ready."

      - name: Configure registry access for KinD
        if: runner.environment != 'self-hosted'
        run: |
          set -euo pipefail
          kubectl create secret docker-registry ghcr-cred \
            --namespace default \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl patch serviceaccount default \
            -n default \
            --type merge \
            -p '{"imagePullSecrets":[{"name":"ghcr-cred"}]}'

      - name: Deploy with Skaffold
        run: |
          set -euo pipefail
          skaffold deploy -p "${SKAFFOLD_PROFILE}" --status-check=true \
            --kube-context "kind-${KIND_CLUSTER_NAME}" \
            --build-artifacts "${{ steps.artifacts.outputs.file }}"

      - name: Build instrumented frontend for E2E tests
        working-directory: web
        run: VITE_API_URL=http://localhost:8080 PLAYWRIGHT_COVERAGE=1 yarn build

      - name: Analyze bundle size
        if: always()
        working-directory: web
        run: |
          {
            echo "### Bundle Size"
            echo ""
            if [ ! -d dist ] || ! find dist -type f \( -name "*.js" -o -name "*.css" \) | grep -q .; then
              echo "No build output found"
            else
              echo "| Asset | Size | Gzip |"
              echo "|-------|------|------|"
              find dist -type f \( -name "*.js" -o -name "*.css" \) -exec sh -c '
                file="$1"
                size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file")
                gzip_size=$(gzip -c "$file" | wc -c)
                printf "| %s | %s | %s |\n" \
                  "$(basename "$file")" \
                  "$(numfmt --to=iec-i --suffix=B "$size" 2>/dev/null || echo "${size}B")" \
                  "$(numfmt --to=iec-i --suffix=B "$gzip_size" 2>/dev/null || echo "${gzip_size}B")"
              ' _ {} \; | sort -k3 -h -r
              echo ""
              total_size=$(find dist -type f \( -name "*.js" -o -name "*.css" \) -exec stat -f%z {} + 2>/dev/null | awk '{sum+=$1} END {print sum}' || \
                           find dist -type f \( -name "*.js" -o -name "*.css" \) -exec stat -c%s {} + | awk '{sum+=$1} END {print sum}')
              echo "**Total:** $(numfmt --to=iec-i --suffix=B "$total_size" 2>/dev/null || echo "${total_size}B")"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Playwright E2E tests
        working-directory: web
        env:
          CI: true
          PLAYWRIGHT_COVERAGE: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_API_URL: http://localhost:8080/graphql
        run: |
          set -euo pipefail

          # Port-forward API from cluster
          kubectl port-forward service/tc 8080:8080 &
          PF_API_PID=$!
          timeout 60 bash -c 'until curl -sf http://localhost:8080/health >/dev/null; do sleep 1; done'

          # Start local preview server with instrumented build
          yarn preview --host 0.0.0.0 --port 5173 --strictPort &
          PREVIEW_PID=$!
          timeout 60 bash -c 'until curl -sf http://localhost:5173 >/dev/null; do sleep 1; done'

          # Run tests - coverage report generated in Playwright global teardown
          yarn playwright:clean
          yarn playwright:test --project chromium || TEST_EXIT=$?

          # Cleanup
          kill "$PREVIEW_PID" "$PF_API_PID" 2>/dev/null || true
          exit "${TEST_EXIT:-0}"

      - name: Publish Playwright test report
        if: always() && hashFiles('web/reports/playwright.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: web/reports/playwright.xml
          report_individual_runs: true
          check_name: Playwright E2E
          comment_mode: off

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results
          if-no-files-found: warn
          path: |
            web/test-results
            web/reports/playwright.xml
            web/reports/playwright-results.json
            web/playwright-report

      - name: Analyze Playwright flakiness
        if: always()
        working-directory: web
        run: node scripts/analyze-playwright-flakiness.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-coverage
          if-no-files-found: warn
          path: web/coverage/playwright/
          retention-days: 7

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo '--- Pods ---'
          kubectl get pods -A -o wide || true
          echo '--- Services ---'
          kubectl get svc -A || true
          echo '--- Events ---'
          kubectl get events -A --sort-by=.lastTimestamp || true
          echo '--- All Resources ---'
          kubectl get all -n default || true

      - name: Cleanup KinD cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}" || true

  # ── CI gate (single required check) ─────────────────────
  ci-gate:
    name: CI Gate
    if: always()
    needs:
      - detect-changes
      - backend-checks
      - lint-kube
      - frontend-checks
      - static-analysis
      - check-dashboards
      - build-images
      - build-wasm
      - scan-images
      - unit-tests
      - rust-checks
      - e2e-tests
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    steps:
      - name: Check results
        run: |
          results='${{ toJson(needs.*.result) }}'
          if echo "$results" | grep -q '"failure"'; then
            echo "One or more required jobs failed"
            exit 1
          fi

  # ── Update gitops image digests (master only) ────────────
  deploy-gitops:
    name: Update gitops image digests
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/master' &&
      needs.ci-gate.result == 'success'
    needs: [ci-gate, detect-changes]
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v6
        with:
          repository: icook/homelab-gitops
          ssh-key: ${{ secrets.GITOPS_DEPLOY_KEY }}
          ref: main

      - uses: ./.github/actions/collect-telemetry

      - name: Install crane
        if: needs.detect-changes.outputs.use-arc == 'true'
        run: |
          CRANE_VERSION=0.20.3
          curl -fsSL "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin crane

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote images from zot to GHCR
        if: needs.detect-changes.outputs.use-arc == 'true'
        run: |
          set -euo pipefail
          ZOT="${{ needs.detect-changes.outputs.image-registry }}"
          GHCR="${{ env.REGISTRY }}"
          SHA="${{ github.sha }}"
          ref="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          branch="${ref//[^a-zA-Z0-9_.-]/-}"
          branch="${branch,,}"
          for IMAGE in tc-api-release tc-ui-release postgres; do
            echo "Promoting ${IMAGE}..."
            crane copy --insecure "${ZOT}/${IMAGE}:${SHA}" "${GHCR}/${IMAGE}:${SHA}"
            crane copy --insecure "${ZOT}/${IMAGE}:branch-${branch}" "${GHCR}/${IMAGE}:branch-${branch}"
          done

      - name: Get image digests from GHCR
        id: digests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          for IMAGE in tc-api-release tc-ui-release postgres; do
            DIGEST=$(gh api \
              "/users/icook/packages/container/tiny-congress%2F${IMAGE}/versions" \
              --jq ".[] | select(.metadata.container.tags[] == \"${SHA}\") | .name")
            echo "${IMAGE}=${DIGEST}" >> "$GITHUB_OUTPUT"
            echo "  ${IMAGE}: ${DIGEST}"
          done

      - name: Read current digests
        id: current
        run: |
          FILE="clusters/sauce/workloads/tiny-congress/helmrelease-demo.yaml"
          SOURCE="clusters/sauce/workloads/tiny-congress/source.yaml"
          {
            echo "api=$(yq '.spec.values.image.digest' "$FILE")"
            echo "ui=$(yq '.spec.values.frontend.image.digest' "$FILE")"
            echo "pg=$(yq '.spec.values.postgres.image.digest' "$FILE")"
            echo "commit=$(yq '.spec.ref.commit' "$SOURCE")"
          } >> "$GITHUB_OUTPUT"

      - name: Update HelmRelease digests
        run: |
          FILE="clusters/sauce/workloads/tiny-congress/helmrelease-demo.yaml"
          CHANGED=""
          # Use | as delimiter (digests contain colons)
          for PAIR in \
            "api|.spec.values.image.digest|${{ steps.digests.outputs.tc-api-release }}|${{ steps.current.outputs.api }}" \
            "ui|.spec.values.frontend.image.digest|${{ steps.digests.outputs.tc-ui-release }}|${{ steps.current.outputs.ui }}" \
            "pg|.spec.values.postgres.image.digest|${{ steps.digests.outputs.postgres }}|${{ steps.current.outputs.pg }}" \
          ; do
            IFS='|' read -r NAME PATH_EXPR NEW OLD <<< "$PAIR"
            if [ "$NEW" = "$OLD" ]; then
              echo "  ${NAME}: unchanged, skipping"
            else
              echo "  ${NAME}: ${OLD} -> ${NEW}"
              yq -i "${PATH_EXPR} = \"${NEW}\"" "$FILE"
              CHANGED="${CHANGED}${NAME} "
            fi
          done
          echo "CHANGED_DIGESTS=${CHANGED}" >> "$GITHUB_ENV"

      - name: Pin chart source to matching commit
        env:
          TC_SHA: ${{ github.sha }}
        run: |
          SOURCE="clusters/sauce/workloads/tiny-congress/source.yaml"
          CHART_CHANGED="${{ needs.detect-changes.outputs.chart }}"
          if [ "$CHART_CHANGED" = "false" ] && [ -z "$CHANGED_DIGESTS" ]; then
            echo "  source commit: no chart or image changes, skipping"
          elif [ "${{ steps.current.outputs.commit }}" = "${TC_SHA}" ]; then
            echo "  source commit: unchanged, skipping"
          else
            echo "  source commit: ${{ steps.current.outputs.commit }} -> ${TC_SHA}"
            yq -i '.spec.ref.commit = strenv(TC_SHA)' "$SOURCE"
          fi

      - name: Commit and push
        env:
          TC_SHA: ${{ github.sha }}
          TC_COMMIT_TITLE: ${{ github.event.head_commit.message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clusters/sauce/workloads/tiny-congress/helmrelease-demo.yaml
          git add clusters/sauce/workloads/tiny-congress/source.yaml
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No digest changes detected"
            exit 0
          fi
          # Build commit message with only changed digests
          TC_TITLE=$(echo "$TC_COMMIT_TITLE" | head -n1)
          TC_SHORT="${TC_SHA:0:7}"
          BODY="Source: ${TC_SHORT} ${TC_TITLE}"
          if echo "$CHANGED_DIGESTS" | grep -q "api"; then
            BODY="${BODY}
          tc-api-release: ${{ steps.digests.outputs.tc-api-release }}"
          fi
          if echo "$CHANGED_DIGESTS" | grep -q "ui"; then
            BODY="${BODY}
          tc-ui-release: ${{ steps.digests.outputs.tc-ui-release }}"
          fi
          if echo "$CHANGED_DIGESTS" | grep -q "pg"; then
            BODY="${BODY}
          postgres: ${{ steps.digests.outputs.postgres }}"
          fi
          git commit -m "chore: update tiny-congress image digests (tc@${TC_SHORT})

          ${BODY}"
          git push

  # ── Upload CI reports to Dufs ────────────────────────────
  deploy-reports:
    name: Upload CI reports to Dufs
    runs-on: ${{ needs.detect-changes.outputs.runner-small }}
    needs: [detect-changes, ci-gate, unit-tests, rust-checks, e2e-tests, frontend-checks, build-docs]
    if: needs.ci-gate.result == 'success'
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/collect-telemetry

      - name: Setup web toolchain
        uses: ./.github/actions/setup-web

      # GHA ubuntu-24.04 pre-installs gettext (envsubst); catthehacker ARC runners do not.
      - name: Install envsubst
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gettext-base

      - name: Create site directory
        run: |
          mkdir -p site
          cp web/src/logo-dark.svg site/logo.svg
          cp web/src/favicon.ico site/favicon.ico

      - name: Download Vitest coverage
        uses: actions/download-artifact@v7
        with:
          name: vitest-coverage
          path: web/coverage/vitest/
        continue-on-error: true

      - name: Download Playwright coverage
        uses: actions/download-artifact@v7
        with:
          name: playwright-coverage
          path: web/coverage/playwright/
        continue-on-error: true

      - name: Download Storybook
        uses: actions/download-artifact@v7
        with:
          name: storybook-static
          path: site/storybook
        continue-on-error: true

      - name: Download Playwright report
        uses: actions/download-artifact@v7
        with:
          name: playwright-test-results
          path: artifacts/playwright
        continue-on-error: true

      - name: Download docs
        uses: actions/download-artifact@v7
        with:
          name: docs
          path: artifacts/docs
        continue-on-error: true

      - name: Download Rust coverage
        uses: actions/download-artifact@v7
        with:
          name: rust-coverage
          path: service/coverage/
        continue-on-error: true

      - name: Summarize coverage to job summary
        id: artifacts
        run: |
          node scripts/summarize-coverage.mjs \
            --vitest web/coverage/vitest/coverage-summary.json \
            --playwright web/coverage/playwright/coverage-summary.json \
            --rust "service/coverage/backend-unit.lcov:unit" \
            --github-output "$GITHUB_OUTPUT" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Install lcov for HTML generation
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Build unified coverage report
        working-directory: web
        run: node scripts/build-coverage-report.mjs

      - name: Organize artifacts
        run: |
          if [ -d coverage-report ]; then mv coverage-report site/coverage; fi
          if [ -d artifacts/playwright/playwright-report ]; then mv artifacts/playwright/playwright-report site/playwright; fi
          if [ -d artifacts/docs/target/doc ]; then mv artifacts/docs/target/doc site/rust-docs; fi
          if [ -d artifacts/docs/web/docs ]; then mv artifacts/docs/web/docs site/ts-docs; fi
          rm -rf artifacts

      - name: Generate landing page
        env:
          COVERAGE_PCT: ${{ steps.artifacts.outputs.coverage_pct }}
          VITEST_LINES: ${{ steps.artifacts.outputs.vitest_lines }}
          VITEST_BRANCHES: ${{ steps.artifacts.outputs.vitest_branches }}
          VITEST_FUNCTIONS: ${{ steps.artifacts.outputs.vitest_functions }}
          PW_LINES: ${{ steps.artifacts.outputs.pw_lines }}
          PW_BRANCHES: ${{ steps.artifacts.outputs.pw_branches }}
          PW_FUNCTIONS: ${{ steps.artifacts.outputs.pw_functions }}
          RUST_LINES: ${{ steps.artifacts.outputs.rust_lines }}
          RUST_FUNCTIONS: ${{ steps.artifacts.outputs.rust_functions }}
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          BUILD_DATE="$(date -u +"%Y-%m-%d %H:%M UTC")"
          export COMMIT_SHORT BUILD_DATE
          envsubst < .github/templates/reports-landing.html > site/index.html

      - name: Upload reports to Dufs
        env:
          DUFS_PASSWORD: ${{ secrets.DUFS_UPLOAD_PASSWORD }}
        run: |
          set -euo pipefail
          DEST="${{ github.sha }}"
          BASE="https://reports-upload.ibcook.com"

          upload_dir() {
            local target="$1"
            local config
            config=$(mktemp)
            local count=0
            local first=true
            while IFS= read -r -d '' file; do
              rel="${file#site/}"
              if $first; then first=false; else printf 'next\n' >> "$config"; fi
              printf 'url = "%s/%s/%s"\nupload-file = "%s"\nuser = "ci:%s"\nmax-time = 60\nsilent\nfail-with-body\n' \
                "$BASE" "$target" "$rel" "$file" "$DUFS_PASSWORD" >> "$config"
              count=$((count + 1))
            done < <(find site -type f -print0)
            local total_bytes start elapsed mb speed
            total_bytes=$(du -sb site | cut -f1)
            start=$(date +%s%3N)
            curl --parallel --parallel-max 8 --retry 2 --config "$config"
            rm "$config"
            elapsed=$(( $(date +%s%3N) - start ))
            mb=$(echo "scale=1; $total_bytes / 1048576" | bc)
            speed=$(echo "scale=1; $total_bytes / 1024 / $elapsed" | bc)
            echo "Uploaded ${count} files (${mb} MB) to ${target}/ in ${elapsed}ms (${speed} MB/s)"
          }

          for attempt in 1 2 3; do
            if upload_dir "$DEST" && upload_dir "latest"; then
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Upload failed (attempt ${attempt}/3), retrying in $((attempt * 60))s..."
              sleep $((attempt * 60))
            else
              echo "Upload failed after 3 attempts"
              exit 1
            fi
          done

          {
            echo "### 📋 CI Reports"
            echo ""
            echo "- [Latest](https://reports.ibcook.com/latest/)"
            echo "- [This run](https://reports.ibcook.com/${DEST}/)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Add PR comment with report links
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pages-reports
          message: |
            ## 🏛️ CI Reports

            **[📋 All Reports](https://reports.ibcook.com/${{ github.sha }}/)**

            ### 📚 API Documentation
            | | |
            |---|---|
            | 🦀 [Rust API Docs](https://reports.ibcook.com/${{ github.sha }}/rust-docs/tinycongress_api/) | 📘 [TypeScript Docs](https://reports.ibcook.com/${{ github.sha }}/ts-docs/) |

            ### 🧪 Test Artifacts
            | | |
            |---|---|
            | 📊 [Coverage](https://reports.ibcook.com/${{ github.sha }}/coverage/) | 📚 [Storybook](https://reports.ibcook.com/${{ github.sha }}/storybook/) |
            | 🎭 [Playwright](https://reports.ibcook.com/${{ github.sha }}/playwright/) | |

            <sub>🤖 Generated from commit ${{ github.sha }}</sub>
