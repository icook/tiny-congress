# Measure warm pod boot penalty: shared DinD vs per-pod sidecar DinD.
# Both pools have minRunners > 0, so pods are pre-scheduled.
# The question: how much does the init-dind-externals + dockerd sidecar startup add?
name: Benchmark DinD boot penalty

on:
  workflow_dispatch:

jobs:
  shared-1:
    name: "Shared DinD #1"
    runs-on: arc-runner-small
    steps:
      - run: echo "::notice::Runner ready at $(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)"

  shared-2:
    name: "Shared DinD #2"
    runs-on: arc-runner-small
    steps:
      - run: echo "::notice::Runner ready at $(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)"

  shared-3:
    name: "Shared DinD #3"
    runs-on: arc-runner-small
    steps:
      - run: echo "::notice::Runner ready at $(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)"

  sidecar-1:
    name: "Sidecar DinD #1"
    runs-on: arc-runner-dind-bench
    steps:
      - run: echo "::notice::Runner ready at $(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)"

  sidecar-2:
    name: "Sidecar DinD #2"
    runs-on: arc-runner-dind-bench
    steps:
      - run: echo "::notice::Runner ready at $(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)"

  sidecar-3:
    name: "Sidecar DinD #3"
    runs-on: arc-runner-dind-bench
    steps:
      - run: echo "::notice::Runner ready at $(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)"
