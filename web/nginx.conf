server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime config is generated into /tmp at container start (writable with readOnlyRootFilesystem)
    location = /config.js {
        alias /tmp/config.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static assets — return 404 if missing (never fall through to SPA)
    location ~* \.(?:css|js|json|map|jpg|jpeg|png|gif|ico|svg|webp|avif|woff2?|ttf|eot)$ {
        try_files $uri =404;
    }

    # Prometheus metrics via nginx-prometheus-exporter sidecar
    location /stub_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # SPA routing — serve index.html for navigation routes only
    location / {
        try_files $uri $uri/ /index.html;
    }
}
