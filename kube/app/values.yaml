# Default values for app.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: tc/backend
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest
  # Optional image digest for immutable deploys (set by CD pipeline)
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# CORS configuration
# For production, override with actual frontend domain(s)
cors:
  # Comma-separated list of allowed origins
  # Empty by default (blocks all cross-origin requests) - must be explicitly configured
  allowedOrigins: ""

# GraphQL configuration
graphql:
  # Enable GraphQL Playground UI at /graphql (GET)
  # Default: false (disabled for security - exposes schema)
  # Enable for local development via skaffold.yaml setValues
  playgroundEnabled: false

# Swagger UI configuration
swagger:
  # Enable Swagger UI at /swagger-ui
  # Default: false (disabled for security - exposes API documentation)
  # Enable for local development via skaffold.yaml setValues
  enabled: false

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  # Annotations to add to the API service (e.g., external-dns, load-balancer config)
  annotations: {}

startupProbe:
  httpGet:
    path: /health
    port: http
  failureThreshold: 60
  periodSeconds: 10
  timeoutSeconds: 2

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

nodeSelector: {}

tolerations: []

affinity: {}

frontend:
  replicaCount: 1
  image:
    repository: tc/frontend-dev
    tag: latest
    pullPolicy: IfNotPresent
    digest: ""
  # API base URL injected at container start via docker-entrypoint.sh.
  # Defaults to the API service's internal DNS name if empty.
  apiUrl: ""
  # Environment label shown as a badge in the UI header.
  # Empty string = production (badge hidden). Values: demo, staging, development.
  environment: ""
  # Demo verifier URL for identity verification redirect flow.
  # Empty string = verifier UI hidden. Only set in demo environments.
  demoVerifierUrl: ""
  service:
    type: ClusterIP
    port: 5173
    targetPort: 5173
    # Annotations to add to the frontend service (e.g., external-dns, load-balancer config)
    annotations: {}
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  exporter:
    image:
      repository: nginx/nginx-prometheus-exporter
      tag: "1.4.1"
  resources: {}
  podDisruptionBudget:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: 1

# Database connection configuration
# Non-secret fields (host, port, name) go into the ConfigMap.
# Secret fields (user, password) go into a Kubernetes Secret.
database:
  # Use an existing Kubernetes Secret for credentials instead of chart-managed values.
  # The Secret must contain keys: "user" and "password".
  # When set, database.user and database.password below are ignored.
  # NOTE: When using existingSecret with an external Postgres, you must also set
  # database.host to the external hostname; otherwise the API connects to the
  # in-cluster Postgres pod.
  existingSecret: ""
  # Connection parameters
  host: ""
  port: 5432
  name: tiny-congress
  user: postgres
  password: postgres
  # Maximum connections in pool
  maxConnections: 10
  # Auto-reset database on migration version mismatch.
  # Only safe for ephemeral databases (e.g. demo environment).
  autoResetOnMigrationFailure: false

# Logging configuration
logging:
  # Log level: debug, info, warn, error
  level: info

postgres:
  # Deploy an in-cluster Postgres pod. Set to false when using an external
  # database (e.g. CloudNativePG, managed Postgres) — configure database.host
  # and database.existingSecret instead.
  enabled: true
  image:
    repository: postgres
    tag: "17"
    pullPolicy: IfNotPresent
    digest: ""
  persistence:
    # Enable to use a PersistentVolumeClaim instead of emptyDir
    enabled: false
    # Name of an existing PVC to use. If empty, defaults to "<fullname>-postgres"
    existingClaim: ""
  # Postgres runs as UID 999 (postgres user in the official image).
  # The entrypoint detects non-root and skips chown, running initdb directly.
  podSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  exporter:
    image:
      repository: quay.io/prometheuscommunity/postgres-exporter
      tag: "v0.17.0"
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

# HMAC key for synthetic backup envelope generation (anti-enumeration).
# REQUIRED — helm template will fail if this is empty and no existing secret
# is found via lookup. For production, override with a strong random secret
# via a sealed-secret or external secret manager. For local dev, Skaffold
# sets this via skaffold.yaml setValues.
syntheticBackupKey: ""

# ID.me OAuth verification (optional)
# When enabled, users can verify their identity via ID.me
idme:
  enabled: false
  clientId: ""
  clientSecret: ""
  # OAuth URLs default to ID.me sandbox; override for production
  authorizeUrl: ""
  tokenUrl: ""
  userinfoUrl: ""
  redirectUri: ""
  stateSecret: ""
  frontendCallbackUrl: ""

# Cargo build cache for dev mode (hostPath volume)
# Shares build cache with local dev via KinD extraMounts
# Requires: kind create cluster --config kind-config.yaml
cargoCache:
  enabled: false
  # Path inside KinD node (mapped from ./service/target via kind-config.yaml)
  hostPath: /cargo-cache

# Simulation worker configuration
sim:
  enabled: false
  schedule: "*/30 * * * *"  # Every 30 minutes
  apiUrl: ""
  openrouterApiKey: ""
  openrouterModel: "anthropic/claude-sonnet-4-6"
  evidenceModel: "deepseek/deepseek-v3.2"
  exaApiKey: ""
  roomTopic: "civic"
  llmBaseUrl: "https://openrouter.ai/api/v1"
  exaBaseUrl: "https://api.exa.ai"
  targetRooms: 5
  votesPerPoll: 15
  voterCount: 20
  logLevel: "info"
  systemPrompt: >-
    You are a civic engagement topic generator. Generate realistic local
    governance topics suitable for community polling. Topics should be
    specific, actionable, and relevant to a small city or town.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Grafana dashboard ConfigMaps (picked up by sidecar with grafana_dashboard label)
dashboards:
  enabled: false

metrics:
  enabled: false

demoVerifier:
  enabled: false
  apiUrl: ""
  allowedCallback: ""
  listenAddr: "0.0.0.0:8090"
  logLevel: "info"
  service:
    annotations: {}
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
