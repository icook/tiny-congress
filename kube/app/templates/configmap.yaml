apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}-config
  labels:
    {{- include "app.labels" . | nindent 4 }}
data:
  config.yaml: |
    database:
      host: {{ include "app.databaseHost" . | quote }}
      port: {{ .Values.database.port }}
      name: {{ .Values.database.name | quote }}
      max_connections: {{ .Values.database.maxConnections | default 10 }}
    server:
      port: {{ .Values.service.port | default 8080 }}
    logging:
      level: {{ .Values.logging.level | default "info" | quote }}
    cors:
      allowed_origins: {{ .Values.cors.allowedOrigins | default "" | quote }}
    graphql:
      playground_enabled: {{ .Values.graphql.playgroundEnabled | default false }}
    swagger:
      enabled: {{ .Values.swagger.enabled | default false }}
{{- if .Values.idme.enabled }}
    idme:
      authorize_url: {{ .Values.idme.authorizeUrl | default "https://api.idmelabs.com/oauth/authorize" | quote }}
      token_url: {{ .Values.idme.tokenUrl | default "https://api.idmelabs.com/oauth/token" | quote }}
      userinfo_url: {{ .Values.idme.userinfoUrl | default "https://api.idmelabs.com/api/public/v3/userinfo" | quote }}
      redirect_uri: {{ .Values.idme.redirectUri | quote }}
      frontend_callback_url: {{ .Values.idme.frontendCallbackUrl | quote }}
{{- end }}
