apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "app.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: TC_DATABASE__USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "app.fullname" .)) }}
                  key: user
            - name: TC_DATABASE__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "app.fullname" .)) }}
                  key: password
            - name: TC_SYNTHETIC_BACKUP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.fullname" . }}-app
                  key: synthetic-backup-key
            {{- if .Values.idme.enabled }}
            - name: TC_IDME__CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.fullname" . }}-idme
                  key: client-id
            - name: TC_IDME__CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.fullname" . }}-idme
                  key: client-secret
            - name: TC_IDME__STATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.fullname" . }}-idme
                  key: state-secret
            {{- end }}
            - name: TC_RATE_LIMIT__ENABLED
              value: {{ .Values.rateLimitEnabled | toString | quote }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: app-config
              mountPath: /etc/tc
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.cargoCache.enabled }}
            - name: cargo-cache
              mountPath: /usr/src/app/target
            {{- end }}
      volumes:
        - name: app-config
          configMap:
            name: {{ include "app.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.cargoCache.enabled }}
        - name: cargo-cache
          hostPath:
            path: {{ .Values.cargoCache.hostPath | default "/tmp/tc-cargo-cache" }}
            type: DirectoryOrCreate
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-frontend
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-frontend
          securityContext:
            {{- toYaml .Values.frontend.securityContext | nindent 12 }}
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}{{ if .Values.frontend.image.digest }}@{{ .Values.frontend.image.digest }}{{ end }}"
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          env:
            - name: VITE_API_URL
              value: {{ .Values.frontend.apiUrl | default (printf "http://%s:8080" (include "app.fullname" .)) | quote }}
            - name: TC_ENVIRONMENT
              value: {{ .Values.frontend.environment | default "" | quote }}
            {{- if .Values.frontend.demoVerifierUrl }}
            - name: TC_DEMO_VERIFIER_URL
              value: {{ .Values.frontend.demoVerifierUrl | quote }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.targetPort | default .Values.frontend.service.port }}
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.targetPort | default .Values.frontend.service.port }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.targetPort | default .Values.frontend.service.port }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
        {{- if .Values.metrics.enabled }}
        - name: nginx-exporter
          image: "{{ .Values.frontend.exporter.image.repository }}:{{ .Values.frontend.exporter.image.tag }}"
          args:
            - --nginx.scrape-uri=http://127.0.0.1:{{ .Values.frontend.service.targetPort | default .Values.frontend.service.port }}/stub_status
          ports:
            - name: metrics
              containerPort: 9113
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
