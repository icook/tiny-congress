{{- if .Values.sim.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-sim
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: sim
type: Opaque
stringData:
  SIM_OPENROUTER_API_KEY: {{ .Values.sim.openrouterApiKey | quote }}
{{- end }}
