{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "app.fullname" . }}-seed
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed
spec:
  schedule: {{ .Values.seed.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            {{- include "app.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: seed
        spec:
          serviceAccountName: {{ include "app.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: seed
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ end }}"
              command: ["seed"]
              envFrom:
                - configMapRef:
                    name: {{ include "app.fullname" . }}-seed
                - secretRef:
                    name: {{ include "app.fullname" . }}-seed
              env:
                - name: TC_DATABASE__USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "app.fullname" .)) }}
                      key: user
                - name: TC_DATABASE__PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "app.fullname" .)) }}
                      key: password
                - name: TC_SYNTHETIC_BACKUP_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "app.fullname" . }}-app
                      key: synthetic-backup-key
              volumeMounts:
                - name: app-config
                  mountPath: /etc/tc
                  readOnly: true
              resources:
                {{- toYaml .Values.seed.resources | nindent 16 }}
          volumes:
            - name: app-config
              configMap:
                name: {{ include "app.fullname" . }}-config
{{- end }}
