{{- if .Values.seed.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-seed
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed
type: Opaque
stringData:
  SEED_OPENROUTER_API_KEY: {{ .Values.seed.openrouterApiKey | quote }}
{{- end }}
