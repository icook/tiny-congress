{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-database
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  user: {{ .Values.database.user | quote }}
  password: {{ .Values.database.password | quote }}
{{- end }}

---

{{- $appSecretName := printf "%s-app" (include "app.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $appSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $appSecretName }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingSecret (index $existingSecret.data "synthetic-backup-key") }}
  synthetic-backup-key: {{ index $existingSecret.data "synthetic-backup-key" }}
  {{- else if .Values.syntheticBackupKey }}
  synthetic-backup-key: {{ .Values.syntheticBackupKey | b64enc }}
  {{- else }}
  {{- fail "syntheticBackupKey must be set in values (or an existing secret must be present). Set .Values.syntheticBackupKey." }}
  {{- end }}

{{- if .Values.idme.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-idme
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ .Values.idme.clientId | quote }}
  client-secret: {{ .Values.idme.clientSecret | quote }}
  state-secret: {{ .Values.idme.stateSecret | quote }}
{{- end }}
