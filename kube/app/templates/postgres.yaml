{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.postgresFullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  {{- if .Values.metrics.enabled }}
  - port: 9187
    targetPort: 9187
    name: metrics
  {{- end }}
  selector:
    {{- include "app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.postgresFullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        {{- toYaml .Values.postgres.podSecurityContext | nindent 8 }}
      containers:
      - image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}{{ if .Values.postgres.image.digest }}@{{ .Values.postgres.image.digest }}{{ end }}"
        imagePullPolicy: {{ .Values.postgres.image.pullPolicy | quote }}
        name: postgres
        securityContext:
          {{- toYaml .Values.postgres.securityContext | nindent 10 }}
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "app.fullname" .)) }}
              key: password
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "app.fullname" .)) }}
              key: user
        - name: POSTGRES_DB
          value: {{ .Values.database.name | quote }}
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql
        - name: postgres-run
          mountPath: /var/run/postgresql
        - name: tmp
          mountPath: /tmp
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U "$POSTGRES_USER"
          initialDelaySeconds: 5
          periodSeconds: 5
      {{- if .Values.metrics.enabled }}
      - name: postgres-exporter
        image: "{{ .Values.postgres.exporter.image.repository }}:{{ .Values.postgres.exporter.image.tag }}"
        ports:
        - containerPort: 9187
          name: metrics
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "app.fullname" .)) }}
              key: user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "app.fullname" .)) }}
              key: password
        - name: POSTGRES_DB
          value: {{ .Values.database.name | quote }}
        - name: DATA_SOURCE_NAME
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@localhost:5432/$(POSTGRES_DB)?sslmode=disable"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      {{- end }}
      volumes:
      - name: postgres-data
        {{- if .Values.postgres.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ .Values.postgres.persistence.existingClaim | default (printf "%s-postgres" (include "app.fullname" .)) }}
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: postgres-run
        emptyDir: {}
      - name: tmp
        emptyDir: {}
{{- end }}
