# Demo environment values for the sauce cluster (tinycongress.com).
#
# Validated in CI: `helm template tc-demo kube/app -f kube/environments/demo.yaml`
# Applied by Flux via HelmRelease valuesFiles (homelab-gitops).
#
# Secrets (sim.openrouterApiKey) are NOT in this file — they're provided
# via SOPS-encrypted valuesFrom in the HelmRelease.

replicaCount: 1

frontend:
  environment: "demo"
  replicaCount: 1
  apiUrl: "https://demo-api.tinycongress.com"
  demoVerifierUrl: "https://demo-verify.tinycongress.com"
  service:
    port: 80
    targetPort: 8080

cors:
  allowedOrigins: "https://demo.tinycongress.com"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

postgres:
  persistence:
    enabled: true

# Auto-reset database when migrations change — acceptable for demo,
# never for production.
database:
  autoResetOnMigrationFailure: true

# HMAC key for synthetic backup envelopes. In-cluster, lookup() reuses
# the existing Secret; this value is only used on first deploy or in CI.
syntheticBackupKey: "demo-synthetic-backup-key-not-for-production"

serviceAccount:
  create: true

# Bootstrap the sim verifier so the sim worker can endorse accounts.
# Key derived from: SHA-256("tc-sim-verifier-root-key-v1") -> Ed25519 pubkey
verifiers:
  - name: "sim_verifier"
    public_key: "ovySo2At7yyERm9siRnjP_txpqBLLRwIjDbH5qVAjG0"
  - name: "demo_verifier"
    public_key: "TE6tpZpkJEPqjGR6h7LDvN2vXkSz5FT6nUnZMGNxZpo"

sim:
  enabled: false  # Disabled: poll lifecycle moved into room bot (#743). See #723, #904 for sim resume work if re-enabling.
  schedule: "*/30 * * * *"
  apiUrl: "http://tc-demo.tiny-congress-demo.svc.cluster.local:8080"
  openrouterModel: "meta-llama/llama-3.3-70b-instruct"
  evidenceModel: "deepseek/deepseek-v3.2"
  roomTopic: "brand_ethics"
  llmBaseUrl: "http://litellm.tiny-congress-demo.svc.cluster.local:4001"
  exaBaseUrl: "http://exa-cache.tiny-congress-demo.svc.cluster.local:4002"
  targetRooms: 5
  votesPerPoll: 15
  voterCount: 20
  systemPrompt: >-
    You are generating poll topics for a small-town community app demo.
    The audience is non-political friends and family — think things people
    argue about at a neighborhood BBQ, not a city council meeting.

    GOOD topics: "How should we spend the new park budget?",
    "What should the school cafeteria prioritize?",
    "Your neighborhood gets $50k — how do you spend it?"

    BAD topics: "Municipal infrastructure development strategies",
    "Environmental conservation policy priorities"

    For each dimension, use specific anchors that make sense for that
    dimension — NOT generic "Not at all / Extremely". Examples:
    "Waste of money" to "Worth every penny", "Nobody wants this" to
    "Everyone's asking for it", "Can wait years" to "Need it yesterday".

    Keep room names short and punchy (under 6 words). Write descriptions
    like a person, not a press release.

dashboards:
  enabled: true

metrics:
  enabled: true

demoVerifier:
  enabled: true
  apiUrl: "http://tc-demo.tiny-congress-demo.svc.cluster.local:8080"
  allowedCallback: "https://demo.tinycongress.com"
  ingress:
    host: "demo-verify.tinycongress.com"
