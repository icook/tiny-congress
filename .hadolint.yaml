# Hadolint configuration
# https://github.com/hadolint/hadolint

failure-threshold: warning

ignored:
  # Pin versions at the base image level (debian:bookworm-slim, postgres:18-alpine),
  # not individual packages. Pinning package versions breaks builds when the
  # exact version expires from repos and prevents security patches.
  - DL3008  # apt pin
  - DL3018  # apk pin

trustedRegistries:
  - docker.io
  - ghcr.io
